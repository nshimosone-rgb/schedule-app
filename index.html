<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日程調整ページ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
      line-height: 1.4;
    }
    p {
      line-height: 1.8;
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 20px;
      border-radius: 10px;
      background: #1a73e8;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>日程調整ページ</h1>
      <p>
        現在、日程調整ページを準備中です。<br>
        次のステップで、日付選択・時間選択・情報入力までできる形にしていきます。
      </p>
      <a class="btn" href="#">準備中</a>
      <div class="note">
        このページが表示されれば、Vercel 側の公開は正常です。
      </div>
    </div>
  </div>
</body>
</html>
