<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日程調整ページ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.4;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    p {
      line-height: 1.8;
      color: #555;
      margin: 0;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .chip {
      border: 1px solid #d0d7de;
      background: #fff;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: .15s ease;
    }
    .chip:hover {
      background: #f0f6ff;
    }
    .chip.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      background: #fff;
    }
    .submit-row {
      margin-top: 18px;
    }
    .btn {
      display: inline-block;
      border: none;
      border-radius: 10px;
      background: #1a73e8;
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .notice {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f0f4ff;
      color: #334;
      font-size: 14px;
      line-height: 1.7;
    }
    .summary {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #eef7ee;
      font-size: 14px;
      line-height: 1.8;
    }
    .empty {
      margin-top: 12px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>日程調整ページ</h1>
      <p>ご希望の日付と時間を選択し、その後に必要情報をご入力ください。</p>
      <div class="notice">
        現在は日付ごとに時間候補が切り替わるところまで実装済みです。<br>
        次のステップで、実際に予約を保存できるようにします。
      </div>
    </div>

    <div class="card">
      <h2>1. 日付を選択</h2>
      <div class="chips" id="dateChips"></div>
    </div>

    <div class="card">
      <h2>2. 時間を選択</h2>
      <div class="chips" id="timeChips"></div>
      <div class="empty" id="emptyTime" style="display:none;">この日の時間候補はありません。</div>
    </div>

    <div class="card">
      <h2>3. 必要情報を入力</h2>
      <div class="grid">
        <div class="field">
          <label>姓</label>
          <input type="text" placeholder="例: 山田">
        </div>
        <div class="field">
          <label>名</label>
          <input type="text" placeholder="例: 太郎">
        </div>
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" placeholder="example@example.com">
        </div>
        <div class="field">
          <label>携帯番号</label>
          <input type="tel" placeholder="09012345678">
        </div>
        <div class="field">
          <label>携帯番号(確認用)</label>
          <input type="tel" placeholder="09012345678">
        </div>
        <div class="field">
          <label>勤続年数</label>
          <input type="text" placeholder="例: 3年">
        </div>
        <div class="field">
          <label>退職予定日</label>
          <input type="date">
        </div>
        <div class="field">
          <label>社会保険の加入</label>
          <select>
            <option>選択してください</option>
            <option>あり</option>
            <option>なし</option>
          </select>
        </div>
        <div class="field">
          <label>雇用保険の加入</label>
          <select>
            <option>選択してください</option>
            <option>あり</option>
            <option>なし</option>
          </select>
        </div>
      </div>

      <div class="summary" id="summaryBox">
        選択中の日付: 未選択<br>
        選択中の時間: 未選択
      </div>

      <div class="submit-row">
        <button class="btn" type="button">この内容で予約する</button>
      </div>
    </div>
  </div>

  <script>
    const scheduleData = {
      "4/28(月)": ["09:00〜09:15", "09:15〜09:30"],
      "4/29(火)": ["10:00〜10:15", "10:15〜10:30", "13:00〜13:15"],
      "4/30(水)": ["09:30〜09:45", "13:30〜13:45"],
      "5/1(木)": ["14:00〜14:15", "14:15〜14:30", "15:00〜15:15"],
      "5/2(金)": ["11:00〜11:15"]
    };

    let selectedDate = "";
    let selectedTime = "";

    function renderDates() {
      const dateChips = document.getElementById("dateChips");
      dateChips.innerHTML = "";

      Object.keys(scheduleData).forEach((date) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = date;

        btn.addEventListener("click", () => {
          selectedDate = date;
          selectedTime = "";
          updateActiveDate();
          renderTimes();
          updateSummary();
        });

        dateChips.appendChild(btn);
      });
    }

    function updateActiveDate() {
      document.querySelectorAll("#dateChips .chip").forEach((chip) => {
        chip.classList.toggle("active", chip.textContent === selectedDate);
      });
    }

    function renderTimes() {
      const timeChips = document.getElementById("timeChips");
      const emptyTime = document.getElementById("emptyTime");
      timeChips.innerHTML = "";

      const times = scheduleData[selectedDate] || [];

      if (!times.length) {
        emptyTime.style.display = "block";
        return;
      }

      emptyTime.style.display = "none";

      times.forEach((time) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = time;

        btn.addEventListener("click", () => {
          selectedTime = time;
          updateActiveTime();
          updateSummary();
        });

        timeChips.appendChild(btn);
      });
    }

    function updateActiveTime() {
      document.querySelectorAll("#timeChips .chip").forEach((chip) => {
        chip.classList.toggle("active", chip.textContent === selectedTime);
      });
    }

    function updateSummary() {
      document.getElementById("summaryBox").innerHTML =
        "選択中の日付: " + (selectedDate || "未選択") + "<br>" +
        "選択中の時間: " + (selectedTime || "未選択");
    }

    renderDates();
  </script>
</body>
</html>
